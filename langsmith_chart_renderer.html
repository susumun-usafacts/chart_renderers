<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LangSmith ECharts Renderer</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.0.0/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: sans-serif;
      background: #f7f7f3;
    }
    #title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    #subtitle { font-size: 13px; color: #555; margin-bottom: 12px; }
    #chart { width: 100%; height: 400px; }
    #placeholder { display: none; }
    #reference {
      display: none;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 12px;
      font-family: monospace;
      white-space: pre;
      overflow: auto;
      max-height: 400px;
      color: #333;
    }
    #reference-label {
      display: none;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div id="title"></div>
  <div id="subtitle"></div>
  <div id="placeholder"></div>
  <div id="reference-label">Expected output</div>
  <div id="reference"></div>
  <div id="chart" style="display:none"></div>

  <script>
    /**
     * LangSmith Custom Output Renderer — ECharts
     *
     * LangSmith loads this page in an iframe when viewing a run from a dataset
     * that has this URL configured under Custom Output Rendering.
     * It then POSTs the run output via window.postMessage with the shape:
     *
     *   {
     *     type: "output" | "reference",
     *     data: { echart_spec: {...}, wrapper: { title, subtitle } },
     *     metadata: { inputs: {...} }
     *   }
     *
     * LangSmith retries the message up to 6 times (100ms → 3200ms back-off)
     * to handle slow-loading pages.
     */

    var chartInstance = null;

    function renderChart(spec, wrapper) {
      document.getElementById('placeholder').style.display = 'none';
      var chartEl = document.getElementById('chart');
      chartEl.style.display = 'block';
      document.getElementById('title').textContent = (wrapper && wrapper.title) || '';
      document.getElementById('subtitle').textContent = (wrapper && wrapper.subtitle) || '';
      if (!chartInstance) {
        chartInstance = echarts.init(chartEl);
      }
      chartInstance.setOption(spec);
    }

    window.addEventListener('message', function (event) {
      var msg = event.data;
      if (!msg) return;

      if (msg.type === 'output') {
        var data = msg.data || {};
        if (data.echart_spec) {
          renderChart(data.echart_spec, data.wrapper || null);
        }
      } else if (msg.type === 'reference') {
        // Show the expected output as formatted JSON so reviewers can see
        // the structured expectations alongside the rendered chart output.
        var ref = msg.data;
        if (ref && Object.keys(ref).length > 0) {
          document.getElementById('reference-label').style.display = 'block';
          var el = document.getElementById('reference');
          el.style.display = 'block';
          el.textContent = JSON.stringify(ref, null, 2);
        }
      }
    });

    window.addEventListener('resize', function () {
      if (chartInstance) chartInstance.resize();
    });
  </script>
</body>
</html>
